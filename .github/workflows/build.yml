name: Build & Publish StockTray

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*.*.*"           # 推送 tag（如 v1.0.0）时触发，用于正式发布
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:       # 支持手动在 Actions 页面触发

env:
  DOTNET_VERSION: "8.0.x"
  RUNTIME: "win-x64"
  PROJECT_FILE: "StockTray.csproj"
  OUTPUT_DIR: "publish"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: 编译 + 发布（必须在 Windows 上，WinForms 依赖 Windows 运行时）
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build (win-x64, self-contained)
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史，确保 gitversion/tag 可用

      # 2. 安装 .NET 8 SDK
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. 缓存 NuGet 包（加速后续构建）
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 4. 还原依赖
      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_FILE }}

      # 5. 编译（Release 配置）
      - name: Build
        run: >
          dotnet build ${{ env.PROJECT_FILE }}
          --configuration Release
          --no-restore

      # 6. 发布为自包含单文件（核心制品）
      - name: Publish single-file executable
        run: >
          dotnet publish ${{ env.PROJECT_FILE }}
          --configuration Release
          --runtime ${{ env.RUNTIME }}
          --self-contained true
          --output ${{ env.OUTPUT_DIR }}
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:PublishTrimmed=false
          --no-restore

      # 7. 列出输出产物（调试用，确认文件生成正确）
      - name: List publish output
        run: Get-ChildItem -Path ${{ env.OUTPUT_DIR }} | Format-Table Name, Length, LastWriteTime
        shell: pwsh

      # 8. 上传制品（每次 push/PR 都保留，可在 Actions 页面下载）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockTray-${{ env.RUNTIME }}-${{ github.sha }}
          path: ${{ env.OUTPUT_DIR }}/StockTray.exe
          retention-days: 30   # 保留 30 天
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: 正式发布到 GitHub Releases（仅当推送 tag 时触发）
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build                # 必须等 build job 成功后才运行
    if: startsWith(github.ref, 'refs/tags/v')   # 仅 tag 触发

    permissions:
      contents: write           # 需要写权限以创建 Release

    steps:
      # 1. 下载上一步的编译制品
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: StockTray-${{ env.RUNTIME }}-${{ github.sha }}
          path: ./dist

      # 2. 重命名为带版本号的文件名（如 StockTray-v1.0.0-win-x64.exe）
      - name: Rename artifact with version tag
        run: |
          TAG_NAME="${{ github.ref_name }}"
          mv ./dist/StockTray.exe "./dist/StockTray-${TAG_NAME}-win-x64.exe"
          echo "RELEASE_ASSET=./dist/StockTray-${TAG_NAME}-win-x64.exe" >> $GITHUB_ENV

      # 3. 创建 Release 并上传制品
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "StockTray ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # 含 "-" 的 tag 标记为预发布（如 v1.0.0-beta）
          generate_release_notes: true   # 自动生成 Release 变更日志
          files: ${{ env.RELEASE_ASSET }}
          body: |
            ## StockTray ${{ github.ref_name }}

            Windows 11 任务栏股票盯盘微端，自包含单文件发行版，**无需安装 .NET 运行时**。

            ### 使用方式
            1. 下载 `StockTray-${{ github.ref_name }}-win-x64.exe`
            2. 双击运行（无需安装）
            3. 右键托盘图标 → **添加股票代码**（如 `sh600519`）

            ### 系统要求
            - Windows 10 / 11（x64）
            - 无其他运行时依赖
